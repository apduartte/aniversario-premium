
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#f3cdb5,#f8e1d4);
font-family:Arial;
overflow:hidden;
}

.card{
background:#ececec;
padding:40px;
border-radius:30px;
text-align:center;
width:420px;
box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

h1{
color:#ff4f6d;
}

.cake{
position:relative;
width:220px;
height:160px;
margin:30px auto;
animation:dance 1.2s infinite ease-in-out;
}

/* bolo dançando */

@keyframes dance{
0%{transform:translateX(-10px)}
50%{transform:translateX(10px)}
100%{transform:translateX(-10px)}
}

.base{
width:220px;
height:130px;
background:linear-gradient(#f7c45b,#eaa33a);
border-radius:25px;
position:absolute;
bottom:0;
box-shadow:inset 0 -8px #d28d2e;
}

.top{
width:220px;
height:50px;
background:#f6a7b8;
border-radius:25px;
position:absolute;
top:0;
box-shadow:inset 0 -6px #e58499;
}

/* olhos */

.eye{
width:35px;
height:35px;
background:white;
border-radius:50%;
position:absolute;
top:65px;
overflow:hidden;
}

.eye.left{left:60px}
.eye.right{right:60px}

.pupil{
width:15px;
height:15px;
background:black;
border-radius:50%;
position:absolute;
top:10px;
left:10px;
transition:0.1s;
}

/* boca */

.mouth{
width:50px;
height:25px;
background:#b3003c;
border-radius:0 0 40px 40px;
position:absolute;
bottom:35px;
left:85px;
animation:talk 0.6s infinite;
}

@keyframes talk{
0%{height:12px}
50%{height:28px}
100%{height:12px}
}

/* velas */

.candle{
width:10px;
height:35px;
position:absolute;
top:-25px;
border-radius:5px;
}

.c1{left:40px;background:#ff6b6b}
.c2{left:95px;background:#6bc5ff}
.c3{left:150px;background:#ffd36b}

.flame{
width:12px;
height:18px;
background:gold;
border-radius:50%;
position:absolute;
top:-15px;
left:-1px;
animation:flame 0.3s infinite alternate;
}

@keyframes flame{
from{transform:scale(1)}
to{transform:scale(1.4)}
}

button{
margin-top:10px;
padding:12px 25px;
border:none;
background:#ff4f6d;
color:white;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="card">

<h1>🎉 Feliz Aniversário 🎉</h1>

<div class="cake">

<div class="candle c1"><div class="flame"></div></div>
<div class="candle c2"><div class="flame"></div></div>
<div class="candle c3"><div class="flame"></div></div>

<div class="top"></div>
<div class="base"></div>

<div class="eye left"><div class="pupil"></div></div>
<div class="eye right"><div class="pupil"></div></div>

<div class="mouth"></div>

</div>

<p>Que seu dia seja incrível! 🎂✨</p>

<button onclick="playSong()">🎵 Tocar música</button>
<button onclick="share()">📱 Enviar WhatsApp</button>

</div>

<script>

/* olhos seguindo mouse */

document.addEventListener("mousemove",(e)=>{

document.querySelectorAll(".pupil").forEach(p=>{

let rect=p.parentElement.getBoundingClientRect()

let x=(e.clientX-rect.left)/20
let y=(e.clientY-rect.top)/20

p.style.transform=`translate(${x}px,${y}px)`

})

})

/* música */

function playSong(){

let ctx=new AudioContext()

let notes=[262,262,294,262,349,330,262,262,294,262,392,349]

notes.forEach((n,i)=>{

let osc=ctx.createOscillator()
osc.frequency.value=n
osc.connect(ctx.destination)
osc.start(ctx.currentTime+i*0.4)
osc.stop(ctx.currentTime+i*0.4+0.3)

})

}

/* WhatsApp */

function share(){

let msg="🎂 Olha seu cartão de aniversário animado!"
let url=window.location.href

window.open(`https://wa.me/?text=${encodeURIComponent(msg+" "+url)}`)

}

/* confete */

let canvas=document.getElementById("confetti")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let confetti=[]

for(let i=0;i<120;i++){

confetti.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*6+2
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

confetti.forEach(c=>{

ctx.beginPath()
ctx.arc(c.x,c.y,c.r,0,Math.PI*2)
ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`
ctx.fill()

c.y+=1
if(c.y>canvas.height)c.y=0

})

}

setInterval(draw,30)

</script>

</body>
</html>
